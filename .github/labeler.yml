# Configuration for GitHub labeler action
# This file defines which labels to apply based on file paths

# Language/Framework labels
typescript:
    - changed-files:
          - any-glob-to-any-file:
                - "**/*.ts"
                - "tsconfig.json"
javascript:
    - changed-files:
          - any-glob-to-any-file:
                - "**/*.js"
bun:
    - changed-files:
          - any-glob-to-any-file:
                - "bun.lock"
                - "bunfig.toml"

# Component labels
cache:
    - changed-files:
          - any-glob-to-any-file:
                - "src/cache/**/*"
mcp:
    - changed-files:
          - any-glob-to-any-file:
                - "src/server/**/*"
                - "src/tools/**/*"
                - "src/resources/**/*"
                - "src/prompts/**/*"
                - "src/index.ts"
config:
    - changed-files:
          - any-glob-to-any-file:
                - "src/config/**/*"
documentation:
    - changed-files:
          - any-glob-to-any-file:
                - "**/*.md"

# Infrastructure labels
ci:
    - changed-files:
          - any-glob-to-any-file:
                - ".github/workflows/**/*"
                - ".github/actions/**/*"
                - ".github/labeler.yml"
dependencies:
    - changed-files:
          - any-glob-to-any-file:
                - "package.json"
                - "bun.lock"
build:
    - changed-files:
          - any-glob-to-any-file:
                - "tsconfig.json"
                - "biome.json"
tests:
    - changed-files:
          - any-glob-to-any-file:
                - "**/*.test.ts"

# Type labels
bug:
    - head-branch:
          - "^fix/.*"
feature:
    - head-branch:
          - "^feat/.*"
chore:
    - head-branch:
          - "^chore/.*"
refactor:
    - head-branch:
          - "^refactor/.*"
          - "^cleanup/.*"
