name: Setup Bun
description: Setup Bun, restore install cache, and install dependencies

inputs:
  bun-version:
    description: Bun version to install
    required: false
    default: "1.3.11"

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Restore Cache
      uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: ubuntu-bun-${{ inputs.bun-version }}-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ubuntu-bun-${{ inputs.bun-version }}-
          ubuntu-bun-

    - name: Install Dependencies
      shell: bash
      run: bun install --frozen-lockfile
