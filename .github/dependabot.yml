version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: "-"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "bun"
    assignees:
      - "vexxvakan"
    groups:
      development-dependencies:
        patterns:
          - "@biomejs/biome"
          - "@types/*"
          - "@modelcontextprotocol/inspector"
          - "release-please"
          - "typescript"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@biomejs/biome"
          - "@types/*"
          - "@modelcontextprotocol/inspector"
          - "release-please"
          - "typescript"
        update-types:
          - "patch"
    allow:
      - dependency-type: "development"
      - dependency-type: "production"
    ignore:
      - dependency-name: "@modelcontextprotocol/sdk"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "03:00"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "ci"
    assignees:
      - "vexxvakan"
    pull-request-branch-name:
      separator: "-"
