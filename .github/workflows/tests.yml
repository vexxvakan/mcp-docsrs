name: Tests

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.11"

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ubuntu-bun-test-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ubuntu-bun-test-${{ env.BUN_VERSION }}-
            ubuntu-bun-test-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test src
        env:
          BUN_ENV: test
          LOG_EXPECTED_ERRORS: "false"
