name: PR Automation

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
  issues:
    types:
      - opened
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  auto-label:
    name: Auto Label
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Label changed paths
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true

  first-interaction:
    name: First Interaction
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Welcome first-time contributors
        uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            Thanks for opening your first issue here. A maintainer will take a
            look soon.
          pr-message: >
            Thanks for your first pull request here. A maintainer will review it soon.

  stale-check:
    name: Mark Stale Items
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: This issue has been inactive for 60 days.
          stale-pr-message: This PR has been inactive for 30 days.
          stale-issue-label: stale
          stale-pr-label: stale
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-close: 14
          exempt-pr-labels: pinned,security,draft
          exempt-issue-labels: pinned,security,bug
          operations-per-run: 30
