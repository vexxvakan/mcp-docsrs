name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    uses: ./.github/workflows/code-quality.yml
    secrets: inherit

  test:
    uses: ./.github/workflows/tests.yml
    secrets: inherit

  build:
    uses: ./.github/workflows/build.yml
    secrets: inherit
