name: Build Release Binaries

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            artifact: dist/mcp-docsrs-linux-x64
          - target: linux-arm64
            artifact: dist/mcp-docsrs-linux-arm64
          - target: darwin-x64
            artifact: dist/mcp-docsrs-darwin-x64
          - target: darwin-arm64
            artifact: dist/mcp-docsrs-darwin-arm64
          - target: windows-x64
            artifact: dist/mcp-docsrs-windows-x64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build executables
        run: bun run build -- ${{ matrix.target }}

      - name: Verify artifact exists
        run: test -f "${{ matrix.artifact }}"

      - name: Smoke test linux x64 binary
        if: matrix.target == 'linux-x64'
        run: ${{ matrix.artifact }} --version

      - name: Report binary size
        run: |
          size=$(stat -c%s "${{ matrix.artifact }}")
          echo "Built ${{ matrix.target }} (${size} bytes)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mcp-docsrs-${{ matrix.target }}
          path: ${{ matrix.artifact }}
          compression-level: 0
          retention-days: 14
