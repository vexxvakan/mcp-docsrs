name: Build

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build executable
        run: bun run build

      - name: Verify artifact exists
        run: test -f dist/mcp-docsrs

      - name: Smoke test built binary
        run: ./dist/mcp-docsrs --version
