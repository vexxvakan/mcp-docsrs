name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Create Release
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main

  build:
    name: Build Binaries
    if: needs.release.outputs.release_created == 'true'
    needs: release
    uses: ./.github/workflows/build-release.yml
    secrets: inherit

  docker:
    name: Publish Docker Images
    if: needs.release.outputs.release_created == 'true'
    needs: release
    uses: ./.github/workflows/docker.yml
    secrets: inherit
    with:
      tag_name: ${{ needs.release.outputs.tag_name }}
      version: ${{ needs.release.outputs.version }}

  publish:
    name: Publish Release Assets
    if: needs.release.outputs.release_created == 'true'
    needs:
      - release
      - build
      - docker
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: mcp-docsrs-*
          merge-multiple: false

      - name: Create checksums
        run: |
          cd artifacts
          find . -type f -print0 | sort -z | xargs -0 sha256sum > checksums.txt

      - name: Upload assets to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t files < <(find artifacts -type f)
          gh release upload "${{ needs.release.outputs.tag_name }}" "${files[@]}" --clobber

      - name: Write release summary
        run: |
          {
            echo "## Release Published"
            echo ""
            echo "- Tag: \`${{ needs.release.outputs.tag_name }}\`"
            echo "- Docker image: \`ghcr.io/${{ github.repository }}:${{ needs.release.outputs.tag_name }}\`"
            echo "- Docker image: \`ghcr.io/${{ github.repository }}:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
